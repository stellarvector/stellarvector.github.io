{{ define "main" }}
<h1 class="relative after:block after:absolute after:-bottom-2 after:left-0 after:w-12 after:h-1 after:bg-accent after:rounded-full">CTF Participation Calendar</h1>

<div class="flex flex-col md:flex-row justify-between items-center gap-8 mt-8">
    <div class="max-w-96 text-body">
        Keep track of our upcoming competitions, training sessions, and team meetings. Sync our schedule with your own to never miss a flag!
    </div>
    <div class="flex flex-wrap flex-grow gap-2 justify-center md:justify-end w-full md:w-auto">
        <a class="btn py-2.5 px-6 rounded-md bg-accent text-accent-text transition-all duration-300 font-semibold hover:bg-accent-light active:scale-95 w-full md:w-auto" href="{{ .Site.Params.calendar.add_link }}" target="_blank">
            > add to google calendar
        </a>
        <a class="btn font-semibold py-2.5 px-6 rounded-md bg-transparent text-body border border-accent transition-all duration-300 hover:border-accent-light active:scale-95 w-full md:w-auto" href="{{ .Site.Params.calendar.ical_address }}" target="_blank">
            > iCal feed
        </a>
    </div>
</div>

<div class="w-full mt-8 border-2 border-accent-dark light:border-accent-tint rounded-lg overflow-hidden">
    <iframe id="calendar" src="{{ .Site.Params.calendar.embed_url }}" class="w-full h-[700px] block invert-[0.9] light:invert-0" frameborder="0" scrolling="no"></iframe>
</div>
{{ end }}
