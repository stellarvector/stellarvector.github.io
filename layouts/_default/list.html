{{ define "main" }}
<div class="prose prose-invert max-w-none">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    
    <div class="not-prose grid gap-6 mt-12">
        {{ range .Pages }}
            <div class="p-6 bg-white/5 border border-white/10 hover:border-white/30 transition-colors">
                <h2 class="text-2xl font-bold mb-2">{{ .Title }}</h2>
                <p class="opacity-60 mb-4">{{ .Date.Format "Monday, Jan 2, 2006" }}</p>
                <a href="{{ .RelPermalink }}" class="inline-block px-4 py-2 bg-white text-black font-semibold hover:bg-gray-200 transition-colors">Read more</a>
            </div>
        {{ end }}
    </div>
</div>
{{ end }}
